<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureTrack v8.9 Golden Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00ff41; --secondary: #58a6ff; --text: #c9d1d9; --border: #30363d; --accent: #f0883e; --danger: #ff4136; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        header { padding: 15px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .status-container { display: flex; align-items: center; font-size: 0.75rem; color: #8b949e; font-family: 'JetBrains Mono'; font-weight: 700; }
        
        /* [v8.5.1 고정] 깜빡이는 도트 */
        .live-status-dot {
            height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px;
            animation: pulse-exchange 1.2s infinite ease-in-out;
        }
        @keyframes pulse-exchange {
            0% { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }
            50% { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
            100% { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }
        }

        .tab-content { display: none; padding: 12px 0; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [v8.5.1 고정] 좌우 꽉 찬 카드 UI */
        .bet-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 18px; margin: 0 10px 12px 10px; position: relative; 
            border-left: 5px solid var(--primary); box-sizing: border-box;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .header-left { display: flex; flex-direction: column; gap: 6px; }
        .market-badge { width: fit-content; font-size: 0.65rem; background: rgba(88, 166, 255, 0.1); padding: 3px 8px; border-radius: 4px; color: var(--secondary); font-weight: 700; border: 1px solid rgba(88, 166, 255, 0.2); }
        .match-time { font-size: 0.7rem; color: #8b949e; font-family: 'JetBrains Mono'; }

        .header-right { display: flex; align-items: center; gap: 8px; }
        .profit-tag { color: var(--primary); font-family: 'JetBrains Mono'; font-weight: 700; font-size: 1.15rem; }
        .calc-icon-inline { color: var(--accent); cursor: pointer; font-size: 1.2rem; }

        .match-title { display: block; margin: 0 0 15px 0; font-weight: 700; color: white; font-size: 1.05rem; line-height: 1.4; }

        .odds-row { display: grid; gap: 8px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        
        .odd-item { background: #0d1117; padding: 14px 4px; border-radius: 10px; text-align: center; border: 1px solid #21262d; display: flex; flex-direction: column; align-items: center; }
        .o-target { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .o-val { color: var(--primary); font-weight: 700; font-family: 'JetBrains Mono'; font-size: 1.1rem; margin-bottom: 8px; }

        /* [v8.9 신규] 로고 & 이니셜 배지 시스템 */
        .bookie-container {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; background: #1c2128; overflow: hidden;
        }
        .bookie-logo { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: grayscale(1) brightness(1.3);
        }
        .bookie-initial {
            font-size: 0.6rem; font-weight: 700; color: var(--secondary);
            text-transform: uppercase; font-family: 'JetBrains Mono';
        }

        /* STATS & CALC */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
        .stat-value { font-family: 'JetBrains Mono'; color: var(--primary); font-weight: 700; font-size: 1.3rem; }
        .calc-container { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin: 0 10px; }
        .calc-input { width: 100%; background: #0d1117; border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: white; margin-bottom: 15px; font-size: 1.1rem; font-family: 'JetBrains Mono'; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { color: #8b949e; text-decoration: none; font-size: 0.65rem; text-align: center; }
        .nav-link i { display: block; font-size: 1.35rem; margin-bottom: 5px; }
        .nav-link.active { color: var(--primary); }
        .v-footer { text-align: center; font-size: 0.65rem; color: #484f58; padding: 25px 0; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<header>
    <div class="logo">SureTrack v8.9</div>
    <div class="status-container"><span class="live-status-dot"></span>SCANNING LIVE</div>
</header>

<div id="tab-scanner" class="tab-content active-tab"><div id="list"></div></div>

<div id="tab-stats" class="tab-content">
    <div class="stats-grid">
        <div class="stat-box"><span style="font-size:0.7rem">TOTAL OPS</span><br><span id="stat-count" class="stat-value">0</span></div>
        <div class="stat-box"><span style="font-size:0.7rem">AVG PROFIT</span><br><span id="stat-avg" class="stat-value">0%</span></div>
    </div>
</div>

<div id="tab-calc" class="tab-content">
    <div class="calc-container">
        <h3 style="color:var(--primary); margin-top:0">Calculator</h3>
        <input type="number" id="o1" class="calc-input" placeholder="Odd A" oninput="runCalc()">
        <input type="number" id="o3" class="calc-input" placeholder="Odd B (Draw)" oninput="runCalc()">
        <input type="number" id="o2" class="calc-input" placeholder="Odd C" oninput="runCalc()">
        <input type="number" id="total" class="calc-input" value="1000000" oninput="runCalc()">
        <div id="calc-res" style="background:rgba(0,255,65,0.05); padding:15px; border-radius:10px; border:1px solid var(--primary)"></div>
    </div>
</div>

<nav>
    <div class="nav-link active" onclick="go('scanner', event)"><i class="fa-solid fa-bolt"></i>SCANNER</div>
    <div class="nav-link" onclick="go('calc', event)"><i class="fa-solid fa-calculator"></i>CALC</div>
    <div class="nav-link" onclick="go('stats', event)"><i class="fa-solid fa-chart-pie"></i>STATS</div>
</nav>

<div class="v-footer">v8.9 SureTrack Golden Master | AI Intelligence</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbx6yjWtdnE06qGtnW95xAtQnSyCgjYIBGBzm6n9e945tUeYPeULg71Tp_5CEImbYBAO/exec';

    // [v8.9 신규] 절대 깨지지 않는 로고 & 배지 로직
    function getBookieElement(name) {
        if (!name) return '<div class="bookie-container"></div>';
        
        const domains = {
            'pinnacle': 'pinnacle.com', 'bet365': 'bet365.com', 'williamhill': 'williamhill.com',
            '1xbet': '1xbet.com', 'marathonbet': 'marathonbet.com', 'unibet': 'unibet.com',
            'betfair': 'betfair.com', 'matchbook': 'matchbook.com', 'coolbet': 'coolbet.com',
            'betsson': 'betsson.com', '888sport': '888sport.com', 'winamax': 'winamax.fr'
        };

        const cleanName = name.toLowerCase().replace(/\s+/g, '');
        const domain = domains[cleanName] || `${cleanName}.com`;
        const initials = name.substring(0, 2);

        // 이미지 로딩 실패 시 텍스트 배지로 전환되는 구조
        return `
            <div class="bookie-container">
                <img class="bookie-logo" 
                     src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" 
                     alt="${name}">
                <span class="bookie-initial" style="display:none;">${initials}</span>
            </div>
        `;
    }

    function go(t, e) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active-tab');
        if(e) e.currentTarget.classList.add('active');
    }

    async function load() {
        try {
            const res = await fetch(URL);
            const rawData = await res.json();
            const sortedData = rawData.sort((a, b) => new Date(a['시작시간']) - new Date(b['시작시간']));
            render(sortedData);
            updateStats(sortedData);
        } catch (e) { console.error("Data Load Error", e); }
    }

    function render(items) {
        const div = document.getElementById('list');
        div.innerHTML = '';

        items.forEach(item => {
            const is3Way = item['배당C'] !== "" && item['배당C'] !== undefined;
            const card = document.createElement('div');
            card.className = 'bet-card';
            
            let displayTime = "N/A";
            if(item['시작시간']) {
                const date = new Date(item['시작시간']);
                displayTime = date.toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
            }

            card.innerHTML = `
                <div class="card-header">
                    <div class="header-left">
                        <span class="market-badge">${item['마켓타입'] === 'H2H' ? '1X2 (승무패)' : 'TOTAL (언오바)'}</span>
                        <span class="match-time">${displayTime} (UTC+9)</span>
                    </div>
                    <div class="header-right">
                        <span class="profit-tag">+${item['수익률(%)']}%</span>
                        <i class="fa-solid fa-calculator calc-icon-inline" onclick="event.stopPropagation(); openCalc('${item['배당A']}', '${item['배당B']}', '${item['배당C']}')"></i>
                    </div>
                </div>
                <span class="match-title">${item['경기명']}</span>
                <div class="odds-row ${is3Way ? 'grid-3' : 'grid-2'}">
                    <div class="odd-item">
                        <span class="o-target">${item['타겟A']}</span>
                        <span class="o-val">${parseFloat(item['배당A']).toFixed(2)}</span>
                        ${getBookieElement(item['북A'])}
                    </div>
                    ${is3Way ? `
                        <div class="odd-item">
                            <span class="o-target">무승부</span>
                            <span class="o-val" style="color:var(--accent)">${parseFloat(item['배당B']).toFixed(2)}</span>
                            ${getBookieElement(item['북B'])}
                        </div>` : ''}
                    <div class="odd-item">
                        <span class="o-target">${is3Way ? item['타겟C'] : item['타겟B']}</span>
                        <span class="o-val">${is3Way ? parseFloat(item['배당C']).toFixed(2) : parseFloat(item['배당B']).toFixed(2)}</span>
                        ${getBookieElement(is3Way ? item['북C'] : item['북B'])}
                    </div>
                </div>
            `;
            card.onclick = () => openCalc(item['배당A'], item['배당B'], item['배당C']);
            div.appendChild(card);
        });
    }

    function updateStats(data) {
        if(!data || data.length === 0) return;
        const count = data.length;
        const avg = (data.reduce((a, b) => a + parseFloat(b['수익률(%)']), 0) / count).toFixed(2);
        document.getElementById('stat-count').innerText = count;
        document.getElementById('stat-avg').innerText = avg + "%";
    }

    function openCalc(a, b, c) {
        document.getElementById('o1').value = a;
        if(c && c !== "") {
            document.getElementById('o3').value = b; document.getElementById('o2').value = c;
            document.getElementById('o3').style.display = 'block';
        } else {
            document.getElementById('o2').value = b; document.getElementById('o3').style.display = 'none';
        }
        go('calc'); runCalc();
    }

    function runCalc() {
        const a = parseFloat(document.getElementById('o1').value);
        const b = parseFloat(document.getElementById('o2').value);
        const draw = parseFloat(document.getElementById('o3').value) || 0;
        const total = parseFloat(document.getElementById('total').value);
        const is3Way = document.getElementById('o3').style.display !== 'none';
        if(!a || !b || !total) return;
        let sumInv = (1/a) + (1/b) + (is3Way ? (1/draw) : 0);
        let p = (total / sumInv) - total;
        document.getElementById('calc-res').innerHTML = `확정 수익: <b>+${Math.floor(p).toLocaleString()}원</b>`;
    }

    load(); setInterval(load, 60000);
</script>
</body>
</html>
