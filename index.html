<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureTrack v8.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00ff41; --secondary: #58a6ff; --text: #c9d1d9; --border: #30363d; --accent: #f0883e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        
        /* 가변형 그리드 레이아웃 핵심 */
        .odds-row { display: grid; gap: 8px; margin-top: 10px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

        .bet-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin: 15px; position: relative; }
        .market-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #238636; color: white; font-weight: bold; }
        .profit-tag { color: var(--primary); font-weight: bold; font-size: 1.1rem; float: right; }
        .match-title { display: block; margin-top: 10px; font-weight: bold; color: white; }
        
        .odd-item { background: #0d1117; padding: 10px 5px; border-radius: 8px; text-align: center; border: 1px solid #21262d; }
        .o-target { display: block; font-size: 0.7rem; color: var(--secondary); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .o-val { color: var(--primary); font-weight: bold; font-size: 1rem; }

        /* 계산기 탭 */
        .tab-content { display: none; padding: 20px; }
        .active-tab { display: block; }
        .calc-input { width: 100%; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .res-box { background: rgba(0, 255, 65, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--primary); }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-link { color: #8b949e; text-decoration: none; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .nav-link i { display: block; font-size: 1.2rem; margin-bottom: 4px; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<header>
    <b style="color:var(--primary)">SureTrack v8.2</b>
    <span style="font-size: 0.7rem">SCANNING LIVE</span>
</header>

<div id="tab-scanner" class="tab-content active-tab">
    <div id="list"></div>
</div>

<div id="tab-calc" class="tab-content">
    <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border)">
        <h3 style="color:var(--primary); margin-top:0">Arbitrage Calculator</h3>
        <label>Odd A</label><input type="number" id="o1" class="calc-input" oninput="runCalc()">
        <label>Odd B</label><input type="number" id="o2" class="calc-input" oninput="runCalc()">
        <label id="label-o3" style="display:none">Odd C (Draw)</label><input type="number" id="o3" class="calc-input" style="display:none" oninput="runCalc()">
        <label>Seed Money</label><input type="number" id="total" class="calc-input" value="1000000" oninput="runCalc()">
        <div id="calc-res" class="res-box">데이터를 선택하세요.</div>
    </div>
</div>

<nav>
    <div class="nav-link active" onclick="go('scanner')"><i class="fa fa-bolt"></i>SCANNER</div>
    <div class="nav-link" onclick="go('calc')"><i class="fa fa-calculator"></i>CALC</div>
    <div class="nav-link"><i class="fa fa-history"></i>HISTORY</div>
    <div class="nav-link"><i class="fa fa-chart-pie"></i>STATS</div>
</nav>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbx6yjWtdnE06qGtnW95xAtQnSyCgjYIBGBzm6n9e945tUeYPeULg71Tp_5CEImbYBAO/exec';

    function go(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active-tab');
        event.currentTarget.classList.add('active');
    }

    async function load() {
        const res = await fetch(URL);
        const data = await res.json();
        const div = document.getElementById('list');
        div.innerHTML = '';
        data.forEach(item => {
            const is3Way = item['배당C'] !== "";
            const card = document.createElement('div');
            card.className = 'bet-card';
            card.onclick = () => open(item['배당A'], item['배당B'], item['배당C']);
            
            card.innerHTML = `
                <span class="profit-tag">+${item['수익률(%)']}%</span>
                <span class="market-badge">${item['마켓타입'] === 'H2H' ? '1X2 (승무패)' : 'TOTAL (언오바)'}</span>
                <span class="match-title">${item['경기명']}</span>
                <div class="odds-row ${is3Way ? 'grid-3' : 'grid-2'}">
                    <div class="odd-item"><span class="o-target">${item['타겟A']}</span><span class="o-val">${item['배당A']}</span></div>
                    <div class="odd-item"><span class="o-target">${item['타겟B']}</span><span class="o-val">${item['배당B']}</span></div>
                    ${is3Way ? `<div class="odd-item"><span class="o-target">${item['타겟C']}</span><span class="o-val">${item['배당C']}</span></div>` : ''}
                </div>
            `;
            div.appendChild(card);
        });
    }

    function open(a, b, c) {
        document.getElementById('o1').value = a;
        document.getElementById('o2').value = b;
        document.getElementById('o3').value = c || "";
        document.getElementById('o3').style.display = c ? 'block' : 'none';
        document.getElementById('label-o3').style.display = c ? 'block' : 'none';
        go('calc');
        runCalc();
    }

    function runCalc() {
        const a = parseFloat(document.getElementById('o1').value);
        const b = parseFloat(document.getElementById('o2').value);
        const c = parseFloat(document.getElementById('o3').value) || 0;
        const total = parseFloat(document.getElementById('total').value);
        
        let sumInv = (1/a) + (1/b) + (c ? (1/c) : 0);
        let b1 = (total * (1/a)) / sumInv;
        let b2 = (total * (1/b)) / sumInv;
        let b3 = c ? (total * (1/c)) / sumInv : 0;
        let p = (total / sumInv) - total;

        document.getElementById('calc-res').innerHTML = `
            <div style="display:flex; justify-content:space-between"><span>A 배팅:</span> <b>${Math.floor(b1).toLocaleString()}원</b></div>
            <div style="display:flex; justify-content:space-between"><span>B 배팅:</span> <b>${Math.floor(b2).toLocaleString()}원</b></div>
            ${c ? `<div style="display:flex; justify-content:space-between"><span>C 배팅:</span> <b>${Math.floor(b3).toLocaleString()}원</b></div>` : ''}
            <div style="margin-top:10px; color:var(--primary); font-size:1.1rem">확정 수익: +${Math.floor(p).toLocaleString()}원</div>
        `;
    }

    load();
    setInterval(load, 60000);
</script>
</body>
</html>
