<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureTrack v9.1 Golden Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; padding-bottom: 110px; min-height: 100vh; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .neon-logo { color: #f59e0b; text-shadow: 0 0 5px #f59e0b, 0 0 15px #d97706; font-weight: 900; font-style: italic; }
        .live-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse-rg 1.5s infinite; }
        @keyframes pulse-rg { 
            0% { background-color: #22c55e; box-shadow: 0 0 5px #22c55e; }
            50% { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
            100% { background-color: #22c55e; box-shadow: 0 0 5px #22c55e; }
        }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .premium-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .elite-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .logo-container { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
        .initial-badge { width: 38px; height: 38px; background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #475569; text-transform: uppercase; }
        .logo-img { position: absolute; top: 0; left: 0; width: 38px; height: 38px; border-radius: 10px; object-fit: contain; z-index: 10; opacity: 0; transition: opacity 0.3s; }
        .center-logo-box { display: flex; justify-content: center; align-items: center; gap: 24px; padding: 18px; background: rgba(0,0,0,0.25); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0f172a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #64748b; cursor: pointer; text-transform: uppercase; font-weight: 700; }
        .nav-item.active { color: #818cf8; }
        .version-tag { font-size: 10px; color: #475569; font-weight: bold; text-align: center; padding: 30px; letter-spacing: 1.5px; opacity: 0.5; }
        .calc-mode-btn { flex: 1; padding: 14px; font-size: 12px; font-weight: 900; border-radius: 15px; background: rgba(255,255,255,0.05); color: #64748b; }
        .calc-mode-btn.active { background: #4f46e5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.5); }
    </style>
</head>
<body>
    <header class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="live-dot"></div>
            <h1 class="text-2xl neon-logo tracking-tighter uppercase">SURETRACK</h1>
        </div>
        <div id="top-balance" class="bg-indigo-950/40 border border-indigo-500/30 px-3 py-1 rounded-full text-xs font-black text-indigo-300 italic">5,720.50 TON</div>
    </header>

    <main id="home-tab" class="tab-content active p-4">
        <div class="flex justify-between items-center mb-5 px-1">
            <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest italic">Live Arbitrage Stream</h2>
            <button onclick="fetchMatches()" class="text-indigo-400 text-[11px] font-black uppercase border-b border-indigo-500/30 pb-0.5">Sync Feed</button>
        </div>
        <div id="api-match-container" class="space-y-5"></div>
        <div class="version-tag">v9.1 TON Golden Master</div>
    </main>

    <script>
        const state = { balance: 5720.50, calcMode: 2 };
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6yjWtdnE06qGtnW95xAtQnSyCgjYIBGBzm6n9e945tUeYPeULg71Tp_5CEImbYBAO/exec';

        async function fetchMatches() {
            const container = document.getElementById('api-match-container');
            container.innerHTML = `<div class="text-center py-20 text-[11px] font-black animate-pulse uppercase tracking-[0.2em]">Syncing Live Scanner...</div>`;
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                container.innerHTML = '';
                data.forEach(m => {
                    const sportEmoji = m['종목'] === 'Soccer' ? '⚽' : (m['종목'] === 'Basketball' ? '🏀' : '🏆');
                    const league = m['리그명'] || 'GLOBAL';
                    const countryEmoji = m['국가'] === 'England' ? '🏴󠁧󠁢󠁥󠁮󠁧󠁿' : (m['국가'] === 'USA' ? '🇺🇸' : '🌍');
                    const time = m['시작시간'] || 'LIVE';
                    const market = m['마켓타입'] || '1X2';
                    const is3Way = m['배당C'] && m['배당C'] !== "";

                    const card = document.createElement('div');
                    card.className = 'glass rounded-[35px] overflow-hidden shadow-2xl';
                    card.innerHTML = `
                        <div class="p-4 bg-white/5 flex justify-between items-center text-[12px] font-black text-slate-400 border-b border-white/5 uppercase italic tracking-widest">
                            <span>${sportEmoji} ${league} ${countryEmoji}</span><span class="text-indigo-400">${time}</span>
                        </div>
                        <div class="p-6 text-center">
                            <div class="text-2xl font-black tracking-tighter text-white italic mb-4">${m['경기명']}</div>
                            <div class="text-[11px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-2">${market}</div>
                            <div class="text-2xl text-white font-mono font-black italic tracking-[0.1em] bg-black/30 py-2 rounded-xl border border-white/5">
                                ${m['배당A']} <span class="text-slate-700 mx-2">/</span> ${m['배당B']} ${is3Way ? '<span class="text-slate-700 mx-2">/</span> ' + m['배당C'] : ''}
                            </div>
                        </div>
                        <div class="center-logo-box border-t border-b border-white/5">
                            <a href="https://${m['북A'].toLowerCase().replace(/\s/g,'')}.com" target="_blank" class="flex items-center gap-3">
                                <div class="logo-container"><div class="initial-badge">${m['북A'][0]}</div><img src="https://icon.horse/icon/${m['북A'].toLowerCase().replace(/\s/g,'')}.com" class="logo-img" onload="this.style.opacity=1"></div>
                                <span class="text-[12px] font-black text-slate-400 italic">${m['북A']}</span>
                            </a>
                            <div class="text-slate-700 text-[10px] font-black italic">VS</div>
                            <a href="https://${m['북B'].toLowerCase().replace(/\s/g,'')}.com" target="_blank" class="flex items-center gap-3">
                                <div class="logo-container"><div class="initial-badge">${m['북B'][0]}</div><img src="https://icon.horse/icon/${m['북B'].toLowerCase().replace(/\s/g,'')}.com" class="logo-img" onload="this.style.opacity=1"></div>
                                <span class="text-[12px] font-black text-slate-400 italic">${m['북B']}</span>
                            </a>
                        </div>
                        <div class="p-5 flex justify-between items-center bg-slate-900/50">
                            <div><div class="text-[9px] text-slate-600 font-black uppercase tracking-widest">Expected ROI</div><div class="text-green-400 font-black text-3xl tracking-tighter italic">+${m['수익률(%)']}%</div></div>
                            <button onclick="prepareCalc('${m['경기명']}', ${m['배당A']}, ${m['배당B']}, ${m['배당C'] || 0})" class="bg-indigo-600 w-14 h-14 rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition-transform"><i class="fa-solid fa-calculator text-xl text-white"></i></button>
                        </div>`;
                    container.appendChild(card);
                });
            } catch(e) { console.error(e); }
        }
        window.onload = () => { fetchMatches(); };
        // [중략: Calculator 및 기타 UI 스크립트 동일]
    </script>
</body>
</html>
