<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureTrack v8.1</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00ff41; --secondary: #58a6ff; --text: #c9d1d9; --accent: #f0883e; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .live-dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 탭 관리 */
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [v8.1 고정] 카드 디자인 */
        .bet-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .market-badge { font-size: 0.65rem; background: var(--border); padding: 2px 6px; border-radius: 4px; color: var(--secondary); font-weight: 700; font-family: 'JetBrains Mono'; }
        .match-time { font-size: 0.7rem; color: #8b949e; display: block; margin-top: 4px; }
        .profit-tag { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; }
        .match-title { font-weight: 700; color: white; display: block; margin: 10px 0; font-size: 0.95rem; }
        
        .odds-row { display: flex; gap: 8px; }
        .odd-item { flex: 1; background: #0d1117; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #21262d; position: relative; }
        .o-target { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 4px; font-weight: 500; }
        .o-val { color: var(--secondary); font-weight: 700; font-family: 'JetBrains Mono', monospace; font-size: 1rem; }
        .calc-icon { color: var(--accent); position: absolute; top: 18px; right: 18px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .calc-icon:active { transform: scale(1.2); }

        /* 계산기 스타일 고정 */
        .calc-container { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; font-family: 'JetBrains Mono', monospace; margin-top: 5px; box-sizing: border-box; }
        .res-box { background: rgba(0, 255, 65, 0.05); border-radius: 12px; padding: 15px; margin-top: 20px; border: 1px solid rgba(0,255,65,0.2); }

        /* 하단 메뉴 고정 (v7.1 규격) */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { text-align: center; color: #8b949e; text-decoration: none; font-size: 0.65rem; }
        .nav-link i { display: block; font-size: 1.3rem; margin-bottom: 5px; }
        .nav-link.active { color: var(--primary); }

        .v-footer { text-align: center; font-size: 0.65rem; color: #484f58; padding: 20px 0; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>

<header>
    <div class="logo">SureTrack v8.1</div>
    <div id="status" style="font-size: 0.7rem; color: #8b949e;"><span class="live-dot"></span>SCANNING</div>
</header>

<div id="tab-scanner" class="tab-content active-tab">
    <div id="scanner-list"></div>
</div>

<div id="tab-calc" class="tab-content">
    <div class="calc-container">
        <h3 style="color:var(--primary); margin:0 0 15px 0;">Arbitrage Calculator</h3>
        <label style="font-size:0.8rem;">Odd A</label><input type="number" id="odd1" oninput="calculate()">
        <label style="font-size:0.8rem;">Odd B</label><input type="number" id="odd2" oninput="calculate()">
        <label style="font-size:0.8rem;">Seed Money</label><input type="number" id="total" value="1000000" oninput="calculate()">
        <div class="res-box" id="calc-result">금액을 입력하세요.</div>
    </div>
</div>

<div class="v-footer">v8.1 SureTrack Golden Master | AI Arbitrage Intelligence System</div>

<nav>
    <div class="nav-link active" onclick="switchTab('scanner')"><i class="fa-solid fa-bolt"></i>SCANNER</div>
    <div class="nav-link" onclick="switchTab('calc')"><i class="fa-solid fa-calculator"></i>CALC</div>
    <div class="nav-link"><i class="fa-solid fa-layer-group"></i>HISTORY</div>
    <div class="nav-link"><i class="fa-solid fa-chart-pie"></i>STATS</div>
</nav>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6yjWtdnE06qGtnW95xAtQnSyCgjYIBGBzm6n9e945tUeYPeULg71Tp_5CEImbYBAO/exec';

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active-tab');
        event.currentTarget.classList.add('active');
    }

    async function fetchData() {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        const list = document.getElementById('scanner-list');
        list.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'bet-card';
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <span class="market-badge">${item['마켓타입']}</span>
                        <span class="match-time">${new Date(item['시작시간']).toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <span class="profit-tag">+${item['수익률(%)']}%</span>
                </div>
                <i class="fa-solid fa-calculator calc-icon" onclick="openCalc(${item['배당A']}, ${item['배당B']})"></i>
                <span class="match-title">${item['경기명']}</span>
                <div class="odds-row">
                    <div class="odd-item"><span class="o-target">${item['타겟A']}</span><span class="o-val">${item['배당A']}</span></div>
                    <div class="odd-item"><span class="o-target">${item['타겟B']}</span><span class="o-val">${item['배당B']}</span></div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function openCalc(a, b) {
        document.getElementById('odd1').value = a;
        document.getElementById('odd2').value = b;
        switchTab('calc');
        calculate();
    }

    function calculate() {
        const a = parseFloat(document.getElementById('odd1').value);
        const b = parseFloat(document.getElementById('odd2').value);
        const t = parseFloat(document.getElementById('total').value);
        if(!a || !b || !t) return;
        const p = (1/a) + (1/b);
        const b1 = (t * (1/a)) / p;
        const b2 = t - b1;
        const prof = (t/p) - t;
        document.getElementById('calc-result').innerHTML = `
            <div style="display:flex; justify-content:space-between;"><span>A 배팅:</span> <b>${Math.floor(b1).toLocaleString()}원</b></div>
            <div style="display:flex; justify-content:space-between;"><span>B 배팅:</span> <b>${Math.floor(b2).toLocaleString()}원</b></div>
            <div style="margin-top:10px; border-top:1px solid #30363d; padding-top:10px; color:var(--primary); display:flex; justify-content:space-between;">
                <span>확정 수익:</span> <b>+${Math.floor(prof).toLocaleString()}원</b>
            </div>
        `;
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
